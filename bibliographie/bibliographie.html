<P>La présente bibliographie, qui se voudrait exhaustive, ne contient cependant pas les innombrables éditions des pièces de Molière qui se sont succédées depuis leur création. Elle ne mentionne pas non plus les petits livres de vulgarisation destinés aux lycéens et aux étudiants de Ier cycle, qui pullulent et ne font que reprendre des études critiques plus approfondies.</P><P>Nous avons en revanche choisi de conserver certaines curiosités, comme par exemple les uvres du poète « réécrites pour jeunes filles », comme on le faisait au XIXe siècle, car cela relève de l'histoire du moliérisme et de celle de la réception littéraire. Pour les mêmes raisons, nous n'avons pas non plus écarté les divers à-propos, poèmes, discours, éloges, hymnes, et autres célébrations écrits à la gloire de Molière, pas plus que les comédies écrites au XVIIIe et au XIXe siècles qui le mettent en scène.</P><P>Les sources de cette bibliographie étant internationales, nous suggérons aux chercheurs de l'interroger également en anglais et en allemand.</P>"
