<P>ICONOGRAPHIE : portraits et gravures du XVIIe siècle relatifs à Molière et au théâtre de son temps.</P>
<P>Ce site, conçu dans un esprit de rigueur scientifique, est destiné à un large public. Aux étudiants ou lycéens qui recherchent des éléments d'information relatifs à Molière ; aux curieux et aux amateurs de théâtre qui s'intéressent à notre dramaturge, et aux chercheurs qui y trouveront une  bibliographie et nombre d'outils de travail commodes.</P>
<P>Menu printcipal : cliquez <A HREF="menu.html">ici</A></P>
<P><A HREF="actualite/index.html">ACTUALITÉS</A> : annonce les oeuvres de Molière montées durant la saison théâtrale,les colloques, et les livres consacrés à Molière.</P>
<P><A HREF="chronologie/index.html">CHRONOLOGIE</A> : présentés par année (de 1622 à 1682) les événements de la vie de Molière, du monde du théâtre et de la littérature, de la vie politique, du monde des sciences et des arts.</P>
<P><A HREF="oeuvres/index.html">OEUVRES DE MOLIERE</A> : tous les textes écrits par Molière : pièces de théâtre, préfaces, dédicaces et poésies, d'après les premières éditions conservées à la Bibliothèque Nationale de France;  précédés d'une notice, de notes contenant explications et variantes.</P>
<P><A HREF="dictionnaire/index.html">DICTIONNAIRE</A> : de 300 entrées environ, articles consacrés aux notions dramaturgiques, résumés de pièces, vie intellectuelle et théâtrale du temps, événements biographiques sur Molière, auteurs, acteurs et autres personnages.</P>
<P><A HREF="bibliographie/index.html">BIBLIOGRAPHIE</A> : bibliographie exhaustive, de 5000 articles et manuels, recherche par nom d'auteur, titre, année de parution.</P>
<P><A HREF="filmographie/index.html">FILMOGRAPHIE</A> :documents cinématographiques ou télévisuels, sur la vie de Molière, ou à des mises en scène françaises et étrangères de ses uvres.</P>
