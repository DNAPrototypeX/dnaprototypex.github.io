<h2>Les ressources</h2>
<p><A HREF="../oeuvres/index.html">oeuvres de Moliere</A> : tous les textes écrits par Molière : pièces de théâtre, préfaces, dédicaces et poésies, d'après les premières éditions conservées à la Bibliothèque Nationale de France;  précédés d'une notice, de notes contenant explications et variantes.</p>
<p><a href="../chronologie/index.html">Biographie Moliere</A> : présentés par année (de 1622 à 1682) les événements de la vie de Molière, du monde du théâtre et de la littérature, de la vie politique, du monde des sciences et des arts.</p>
<p><A HREF="../filmographie/index.php">filmographie</A> : documents cinématographiques ou télévisuels, sur la vie de Molière, ou à des mises en scène françaises et étrangères de ses oeuvres.</p>
<p><A HREF="../dictionnaire/index.html">dictionnaire</A> : de 300 entrées environ, articles consacrés aux notions dramaturgiques, résumés de pièces, vie intellectuelle et théâtrale du temps, événements biographiques sur Molière, auteurs, acteurs et autres personnages.</p>
<p><A HREF="../bibliographie/index.php">bibliographie</A> : bibliographie exhaustive, de 5000 articles et manuels, recherche par nom d'auteur, titre, année de parution.</p>
<p><A HREF="../iconographie/index.php">iconographie</A> : images, portraits et gravures du XVIIe siècle relatifs à Molière et au théâtre de son temps.</p>
